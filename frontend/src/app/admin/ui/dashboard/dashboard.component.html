<div class="view active">
  <div class="page-header">
    <div class="page-title">Mis Torneos</div>
    <div class="page-subtitle">Organizá y gestioná tus torneos de taekwondo desde un solo lugar.</div>
  </div>
  <div class="torneos-grid">
    @for (tournament of tournamentService.tournaments(); track tournament.id) {
      <app-tournament-card [tournament]="tournament" />
    }
    
    <div class="card-create" (click)="onCreateTournament()">
      <div class="create-icon">+</div>
      <div class="create-title">Crear nuevo torneo</div>
      <p class="create-sub">Agregá un torneo o competencia a tu cuenta.</p>
    </div>
  </div>
</div>
